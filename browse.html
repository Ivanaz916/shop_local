<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Local Arlington — Virtual Street Walk</title>
    <meta name="description" content="Explore Massachusetts Avenue in Arlington Center. Walk the street and step inside local shops with 360° views.">

    <!-- Pannellum (free, MIT-licensed 360° viewer) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- App styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- ===== TOP BAR ===== -->
    <header id="top-bar">
        <div class="top-bar-left">
            <p class="top-bar-eyebrow">Arlington Center &middot; Massachusetts Avenue</p>
            <h1>Walk the Block</h1>
        </div>
        <button id="nav-toggle" class="nav-toggle-topbar" aria-label="Toggle navigation" aria-expanded="false">
            <svg class="nav-icon nav-icon-open" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
            </svg>
            <svg class="nav-icon nav-icon-close" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/>
            </svg>
        </button>
    </header>

    <!-- ===== SIDE NAV (collapsible) ===== -->
    <div id="nav-overlay"></div>
    <nav id="side-nav" aria-label="Main navigation">
        <a href="index.html" class="side-nav-link">Home</a>
        <a href="browse.html" class="side-nav-link">Walk the Block</a>
        <a href="requests.html" class="side-nav-link">Circular Economy</a>
        <a href="get-involved.html" class="side-nav-link">Get Involved</a>
        <a href="about.html" class="side-nav-link">About</a>
    </nav>

    <!-- ===== SIDEBAR — shop directory ===== -->
    <aside id="sidebar" class="sidebar-closed">
        <div id="sidebar-header">
            <h2>Participating Shops</h2>
            <div id="filter-container">
                <select id="category-filter" aria-label="Filter by category">
                    <option value="all">All Categories</option>
                </select>
            </div>
        </div>
        <ul id="shop-list">
            <!-- Populated dynamically from shops.json -->
        </ul>
    </aside>

    <!-- ===== MAIN VIEWER AREA ===== -->
    <main id="viewer-container">
        <!-- Neighborhood photos grid -->
        <div id="photo-grid" class="photo-grid modern-grid"></div>

        <!-- Pannellum — indoor 360° interiors -->
        <div id="pannellum-view" class="hidden"></div>

        <!-- Loading overlay -->
        <div id="loading-overlay" class="hidden">
            <div class="spinner"></div>
            <p>Loading panorama…</p>
        </div>
    </main>

    <!-- Floating back button (visible during 360° view) -->
    <button id="pano-back-btn" class="pano-back-btn hidden" onclick="exitToStreet()">← Back to Gallery</button>

    <!-- ===== SHOP INFO PANEL (slides up on shop entry) ===== -->
    <div id="shop-info-panel" class="panel-hidden">
        <button id="panel-close" aria-label="Close info panel">&times;</button>
        <div id="panel-content">
            <h3 id="panel-shop-name"></h3>
            <p id="panel-shop-description"></p>
            <div id="panel-details">
                <span id="panel-shop-category" class="detail-tag"></span>
                <span id="panel-shop-hours" class="detail-item">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span></span>
                </span>
            </div>
            <div id="panel-actions">
                <a id="panel-shop-website" href="#" target="_blank" rel="noopener" class="btn btn-primary">Visit Website</a>
            </div>
        </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script src="js/app.js"></script>
    <script src="js/interior.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
